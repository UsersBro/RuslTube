<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuslTube</title>
    <style>
        :root { --bg: #0f0f0f; --surf: #1f1f1f; --text: #fff; --red: #ff0000; --blue: #3ea6ff; --border: #333; --card-bg: #000; }
        body.light { --bg: #f9f9f9; --surf: #fff; --text: #0f0f0f; --border: #ddd; --card-bg: #eee; }
        
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        header { display: flex; justify-content: space-between; padding: 10px 20px; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: bold; cursor: pointer; }
        .logo span { background: var(--red); padding: 2px 6px; border-radius: 4px; color: #fff; }
        
        .search-bar { display: flex; flex: 0 1 500px; }
        .search-bar input { width: 100%; padding: 10px 15px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 20px 0 0 20px; outline: none; }
        .search-bar button { padding: 0 15px; background: var(--surf); border: 1px solid var(--border); border-radius: 0 20px 20px 0; color: var(--text); cursor: pointer; }

        .page { padding: 20px; display: none; }
        #homePage { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; object-fit: cover; }
        .card-info { display: flex; gap: 12px; margin-top: 8px; }
        .card-info h4 { margin: 0; font-size: 15px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-info p { margin: 3px 0 0 0; font-size: 13px; color: #888; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; object-fit: cover; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        #videoPage { grid-template-columns: minmax(0, 1fr) 350px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        .player-side video { width: 100%; border-radius: 12px; background: #000; max-height: 70vh; }
        
        .v-desc { background: var(--surf); padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 14px; line-height: 1.4; border: 1px solid var(--border); }
        .actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }

        .sub-btn { background: var(--text); color: var(--bg); padding: 0 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; height: 36px; }
        .sub-btn.active { background: var(--surf); color: var(--text); border: 1px solid var(--border); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surf); padding: 25px; border-radius: 15px; z-index: 1001; width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        .modal input, .modal textarea { width: 93%; padding: 10px; margin-bottom: 12px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .theme-toggle { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">Rusl<span>Tube</span></div>
        <div class="search-bar">
            <input type="text" id="sInp" placeholder="Поиск...">
            <button onclick="search()">🔍</button>
        </div>
        <div id="authBox">
            <button onclick="openM('loginM')" id="loginBtnUI" class="sub-btn" style="background:var(--blue); color:white;">Войти</button>
            <div id="userUI" style="display:none; gap:15px; align-items:center;">
                <button onclick="openM('upM')" style="background:var(--surf); color:var(--text); border-radius:20px; padding:6px 15px; cursor:pointer; border:1px solid var(--border);">+ Видео</button>
                <div class="avatar" id="myHeadAv" onclick="openM('settingsM')" style="cursor:pointer; width:34px; height:34px; border:1px solid var(--blue);"></div>
            </div>
        </div>
    </header>

    <div id="homePage" class="page">
        <div id="searchChannels" style="display:none; gap:20px; margin-bottom:20px;"></div>
        <div class="grid" id="mainFeed"></div>
        <center><button id="loadMoreBtn" onclick="renderMore()" class="sub-btn" style="margin-top:30px; display:none;">Показать еще</button></center>
    </div>

    <div id="videoPage" class="page">
        <div class="player-side">
            <video id="vPl" controls autoplay></video>
            <h2 id="vT" style="margin:15px 0 5px 0;"></h2>
            <div id="vViewsText" style="color:#888; font-size:13px; margin-bottom:15px;"></div>
            
            <div class="v-desc" id="vDescText"></div>

            <div class="actions">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="avatar" id="authorAv" style="cursor:pointer;"></div>
                    <div>
                        <b id="vA" style="cursor:pointer;"></b>
                        <div id="vSubCount" style="font-size:12px; color:#888;"></div>
                    </div>
                    <button id="subBtn" class="sub-btn">Подписаться</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="sub-btn active" id="likeBtn" onclick="toggleLike()" style="display:flex; align-items:center; gap:8px;">
                        <span id="likeIcon">🤍</span> <span id="likeCount">0</span>
                    </div>
                    <div id="vDelPlace"></div>
                </div>
            </div>

            <div class="comm-box">
                <h4 id="cCount">0 Комментариев</h4>
                <div class="comm-add">
                    <input type="text" id="cInp" placeholder="Оставьте комментарий...">
                    <button onclick="addComm()" class="sub-btn" style="background:var(--blue); color:#fff;">ОК</button>
                </div>
                <div id="cList" style="margin-top:20px;"></div>
            </div>
        </div>
        <div id="recList" class="rec-side"></div>
    </div>

    <div id="channelPage" class="page">
        <div style="display:flex; align-items:center; gap:20px; padding:30px; background:var(--surf); border-radius:15px; margin-bottom:20px;">
            <div class="avatar" id="chAv" style="width:80px; height:80px; font-size:30px;"></div>
            <div>
                <h2 id="chName" style="margin:0;"></h2>
                <p id="chSubs" style="color:#888; margin:5px 0 10px 0;"></p>
                <button id="chSubBtn" class="sub-btn">Подписаться</button>
            </div>
        </div>
        <div class="grid" id="chFeed"></div>
    </div>

    <div class="overlay" id="ovl" onclick="closeM()"></div>
    
    <div id="settingsM" class="modal">
        <h3>Настройки</h3>
        <p style="font-size:12px; color:var(--blue);">Аватар:</p>
        <input type="file" id="avF" accept="image/*">
        <button class="btn-main" onclick="updateAvatar()" style="margin-bottom:10px;">Сохранить фото</button>
        <button class="btn-main" onclick="openChannel(user)" style="background:var(--surf); color:var(--text); border:1px solid var(--border);">Мой канал</button>
        
        <div class="theme-toggle">
            <span>Светлая тема</span>
            <input type="checkbox" id="themeCheck" onchange="toggleTheme()">
        </div>
        <button class="btn-main" onclick="logout()" style="background:#311; color:#f66; margin-top:20px;">Выйти</button>
    </div>

    <div id="upM" class="modal">
        <h3>Загрузка видео</h3>
        <input type="text" id="upT" placeholder="Название (макс 50)" maxlength="50">
        <textarea id="upD" placeholder="Описание (макс 50)" maxlength="50" rows="3"></textarea>
        <input type="file" id="upF" accept="video/*">
        <div id="upS"></div>
        <button class="btn-main" onclick="upload()">Опубликовать</button>
    </div>

    <div id="loginM" class="modal">
        <h3>Вход</h3>
        <input type="text" id="liU" placeholder="Логин (макс 10)" maxlength="10">
        <input type="password" id="liP" placeholder="Пароль">
        <button class="btn-main" onclick="auth('login')">Войти</button>
        <p onclick="openM('regM')" style="cursor:pointer; color:var(--blue); font-size:12px; text-align:center;">Нет аккаунта? Регистрация</p>
    </div>

    <div id="regM" class="modal">
        <h3>Регистрация</h3>
        <input type="text" id="rgU" placeholder="Логин (макс 10)" maxlength="10">
        <input type="password" id="rgP" placeholder="Пароль">
        <button class="btn-main" onclick="auth('reg')">Создать</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, serverTimestamp, getDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBw5b72gU3RIBn3NUqwnJz4a7QAf-ox-hg", authDomain: "rusltube-ff487.firebaseapp.com", projectId: "rusltube-ff487", storageBucket: "rusltube-ff487.firebasestorage.app", messagingSenderId: "144869005114", appId: "1:144869005114:web:764ec36730b6c8c7012203" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const CLOUD = "dujfw1ch1"; const PRESET = "RuslTube";
        
        window.user = localStorage.getItem("rUser");
        let curVid = null; let homeVids = []; let homeStart = 0;

        // Тема
        if(localStorage.getItem('lightMode') === 'true') { document.body.classList.add('light'); document.getElementById('themeCheck').checked = true; }
        window.toggleTheme = () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('lightMode', isLight);
        };

        function esc(s) { return s ? s.toString().substring(0,100).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ""; }
        async function getAv(n) {
            const q = query(collection(db, "users"), where("u", "==", n));
            const s = await getDocs(q); let url = ""; s.forEach(d => url = d.data().av || ""); return url;
        }
        function drawAv(u, n) { return u ? `<img src="${u}">` : (n ? n[0].toUpperCase() : "?"); }

        window.switchPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = (id === 'videoPage') ? 'grid' : 'block';
            if(id !== 'videoPage') document.getElementById('vPl').pause();
        };

        window.goHome = () => { switchPage('homePage'); loadFeed(); };
        window.openM = (id) => { closeM(); document.getElementById(id).style.display='block'; document.getElementById('ovl').style.display='block'; };
        window.closeM = () => { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('ovl').style.display='none'; };

        window.openV = async (id) => {
            curVid = id; window.scrollTo(0,0);
            await updateDoc(doc(db, "videos", id), { views: increment(1) });
            const d = (await getDoc(doc(db, "videos", id))).data();
            switchPage('videoPage');
            document.getElementById('vPl').src = d.url;
            document.getElementById('vT').innerText = d.title.substring(0,50);
            document.getElementById('vDescText').innerText = d.desc ? d.desc.substring(0,50) : "Нет описания";
            document.getElementById('vViewsText').innerText = `${d.views || 1} просмотров`;
            document.getElementById('vA').innerText = "@" + d.author.substring(0,10);
            const av = await getAv(d.author);
            document.getElementById('authorAv').innerHTML = drawAv(av, d.author);
            document.getElementById('vDelPlace').innerHTML = (d.author === user) ? `<button class="sub-btn" style="color:red;" onclick="deleteVid('${id}')">Удалить</button>` : "";
            updateSubUI(d.author, 'subBtn', 'vSubCount'); updateLikeUI(); loadComms(id); loadRecs(id);
        };

        window.loadFeed = async () => {
            const s = await getDocs(collection(db, "videos"));
            homeVids = s.docs.map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5);
            document.getElementById('mainFeed').innerHTML = ""; homeStart = 0; renderMore();
        };

        window.renderMore = async () => {
            const end = Math.min(homeStart + 24, homeVids.length);
            const f = document.getElementById('mainFeed');
            for (let i = homeStart; i < end; i++) {
                const v = homeVids[i]; const av = await getAv(v.author);
                f.innerHTML += `<div class="card" onclick="openV('${v.id}')"><video src="${v.url}#t=1"></video><div class="card-info"><div class="avatar" onclick="event.stopPropagation(); openChannel('${v.author}')">${drawAv(av, v.author)}</div><div><h4>${esc(v.title)}</h4><p>@${esc(v.author.substring(0,10))} • ${v.views || 0} просмотров</p></div></div></div>`;
            }
            homeStart = end; document.getElementById('loadMoreBtn').style.display = (homeStart < homeVids.length) ? 'block' : 'none';
        };

        async function loadRecs(id) {
            const s = await getDocs(collection(db, "videos"));
            let r = s.docs.filter(d => d.id !== id).map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5).slice(0, 7);
            const l = document.getElementById('recList'); l.innerHTML = "";
            r.forEach(v => {
                l.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:12px; cursor:pointer;" onclick="openV('${v.id}')"><video src="${v.url}#t=1" style="width:140px; aspect-ratio:16/9; border-radius:8px; object-fit:cover;"></video><div><h5 style="margin:0; font-size:13px;">${esc(v.title)}</h5><p style="font-size:11px; color:#888;">@${esc(v.author.substring(0,10))}</p></div></div>`;
            });
        }

        window.upload = async () => {
            const f = document.getElementById('upF').files[0]; const t = document.getElementById('upT').value.trim(); const d = document.getElementById('upD').value.trim();
            if(!f || !t) return alert("Файл и название обязательны!");
            document.getElementById('upS').innerText = "Загрузка...";
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/video/upload`, {method:'POST', body:fd});
            const data = await res.json();
            await addDoc(collection(db, "videos"), { title: t, desc: d, url: data.secure_url, author: user, views: 0, createdAt: serverTimestamp() }); location.reload();
        };

        window.auth = async (m) => {
            const u = document.getElementById(m=='reg'?'rgU':'liU').value.trim().substring(0,10);
            const p = document.getElementById(m=='reg'?'rgP':'liP').value.trim();
            if(!u || !p) return;
            if(m=='reg') {
                const q = query(collection(db, "users"), where("u","==",u));
                if(!(await getDocs(q)).empty) return alert("Занят!");
                await addDoc(collection(db, "users"), {u, p, av: ""});
            } else {
                const q = query(collection(db, "users"), where("u","==",u), where("p","==",p));
                if((await getDocs(q)).empty) return alert("Неверно!");
            }
            localStorage.setItem("rUser", u); location.reload();
        };

        window.updateAvatar = async () => {
            const f = document.getElementById('avF').files[0]; if(!f) return;
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, {method:'POST', body:fd});
            const data = await res.json();
            const q = query(collection(db, "users"), where("u", "==", user));
            const s = await getDocs(q); await updateDoc(doc(db, "users", s.docs[0].id), { av: data.secure_url }); location.reload();
        };

        window.logout = () => { localStorage.removeItem("rUser"); location.reload(); };

        window.toggleLike = async () => {
            if(!user) return openM('loginM');
            const q = query(collection(db, "likes"), where("vId", "==", curVid), where("u", "==", user));
            const s = await getDocs(q);
            if(s.empty) await addDoc(collection(db, "likes"), {vId: curVid, u: user});
            else await deleteDoc(doc(db, "likes", s.docs[0].id));
            updateLikeUI();
        };

        async function updateLikeUI() {
            const q = query(collection(db, "likes"), where("vId", "==", curVid));
            const s = await getDocs(q); document.getElementById('likeCount').innerText = s.size;
            let mine = false; s.forEach(d => { if(d.data().u === user) mine = true; });
            document.getElementById('likeIcon').innerText = mine ? "❤️" : "🤍";
        }

        window.addComm = async () => {
            const t = document.getElementById('cInp').value.trim();
            if(!user || !t) return;
            await addDoc(collection(db, "comments"), { vId: curVid, u: user, t, createdAt: serverTimestamp() });
            document.getElementById('cInp').value = ""; loadComms(curVid);
        };

        async function loadComms(vId) {
            const q = query(collection(db, "comments"), where("vId", "==", vId));
            const s = await getDocs(q); const l = document.getElementById('cList'); l.innerHTML = "";
            document.getElementById('cCount').innerText = `${s.size} Комментариев`;
            const docs = s.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));
            for (const d of docs) {
                const c = d.data(); const av = await getAv(c.u);
                l.innerHTML += `<div style="display:flex; gap:12px; margin-bottom:12px;"><div class="avatar" style="width:32px; height:32px;">${drawAv(av, c.u)}</div><div><b style="font-size:13px;">@${esc(c.u.substring(0,10))}</b><p style="margin:2px 0 0; font-size:14px;">${esc(c.t)}</p></div></div>`;
            }
        }

        window.updateSubUI = async (a, bId, cId) => {
            const qS = query(collection(db, "subs"), where("to", "==", a));
            const count = (await getDocs(qS)).size;
            document.getElementById(cId).innerText = `${count} Подписчиков`;
            const btn = document.getElementById(bId); if(!user || !btn) return;
            const qM = query(collection(db, "subs"), where("from","==",user), where("to","==",a));
            const snap = await getDocs(qM);
            btn.innerText = snap.empty ? "Подписаться" : "Вы подписаны";
            btn.className = snap.empty ? "sub-btn" : "sub-btn active";
            btn.onclick = () => toggleSub(a, bId, cId);
        };

        window.toggleSub = async (a, bId, cId) => {
            if(!user) return openM('loginM'); if(a === user) return;
            const q = query(collection(db, "subs"), where("from","==",user), where("to","==",a));
            const snap = await getDocs(q);
            if(snap.empty) await addDoc(collection(db, "subs"), {from:user, to:a});
            else await deleteDoc(doc(db, "subs", snap.docs[0].id));
            updateSubUI(a, bId, cId);
        };

        if(user) { 
            document.getElementById('loginBtnUI').style.display='none'; document.getElementById('userUI').style.display='flex';
            getAv(user).then(url => document.getElementById('myHeadAv').innerHTML = drawAv(url, user));
        }
        loadFeed();
    </script>
</body>
</html>
