<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuslTube</title>
    <style>
        :root { --bg: #0f0f0f; --surf: #1f1f1f; --text: #fff; --red: #ff0000; --blue: #3ea6ff; --border: #333; --card-bg: #000; }
        body.light { --bg: #f9f9f9; --surf: #fff; --text: #0f0f0f; --border: #ddd; --card-bg: #eee; }
        
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        header { display: flex; justify-content: space-between; padding: 10px 20px; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: bold; cursor: pointer; }
        .logo span { background: var(--red); padding: 2px 6px; border-radius: 4px; color: #fff; }
        
        .search-bar { display: flex; flex: 0 1 500px; }
        .search-bar input { width: 100%; padding: 10px 15px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 20px 0 0 20px; outline: none; }
        .search-bar button { padding: 0 15px; background: var(--surf); border: 1px solid var(--border); border-radius: 0 20px 20px 0; color: var(--text); cursor: pointer; }

        .page { padding: 20px; display: none; }
        #homePage { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { cursor: pointer; }
        .card .thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .card .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { display: flex; gap: 12px; margin-top: 8px; }
        .card-info h4 { margin: 0; font-size: 15px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-info p { margin: 3px 0 0 0; font-size: 13px; color: #888; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; object-fit: cover; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        #videoPage { grid-template-columns: minmax(0, 1fr) 350px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        
        .player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-wrap video { width: 100%; height: 100%; object-fit: contain; }
        
        .endscreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }
        
        .endscreen-content { display: flex; width: 100%; justify-content: space-around; align-items: center; max-width: 900px; flex: 1; }
        .endscreen-author { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; color: #fff; text-align: center; transition: 0.2s; }
        .endscreen-author:hover { transform: scale(1.05); }
        
        .endscreen-recs { display: flex; gap: 20px; max-width: 60%; }
        .endscreen-rec-card { width: 180px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .endscreen-rec-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); border-color: var(--blue); }
        .endscreen-rec-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; }
        .endscreen-rec-card h5 { margin: 8px 0 0 0; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }

        .endscreen-controls { display: flex; gap: 15px; margin-top: auto; padding-bottom: 15px; }
        .ctrl-btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 10px 22px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .ctrl-btn:hover { background: #fff; color: #000; transform: translateY(-2px); }

        .v-desc { background: var(--surf); padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 14px; line-height: 1.4; border: 1px solid var(--border); white-space: pre-wrap; }
        .actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }

        .sub-btn { background: var(--text); color: var(--bg); padding: 0 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; height: 36px; }
        .sub-btn.active { background: var(--surf); color: var(--text); border: 1px solid var(--border); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surf); padding: 25px; border-radius: 15px; z-index: 1001; width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        .modal input, .modal textarea { width: 93%; padding: 10px; margin-bottom: 12px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; outline: none; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .ch-card { display: flex; flex-direction: column; align-items: center; min-width: 100px; cursor: pointer; text-align: center; }
        .theme-toggle { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .del-comment-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 11px; margin-left: 10px; padding: 0; }
        .del-comment-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">Rusl<span>Tube</span></div>
        <div class="search-bar">
            <input type="text" id="sInp" placeholder="Поиск..." onkeydown="if(event.key==='Enter') search()">
            <button onclick="search()">🔍</button>
        </div>
        <div id="authBox">
            <button onclick="openM('loginM')" id="loginBtnUI" class="sub-btn" style="background:var(--blue); color:white;">Войти</button>
            <div id="userUI" style="display:none; gap:15px; align-items:center;">
                <button onclick="openM('upM')" style="background:var(--surf); color:var(--text); border-radius:20px; padding:6px 15px; cursor:pointer; border:1px solid var(--border);">+ Видео</button>
                <div class="avatar" id="myHeadAv" onclick="openM('settingsM')" style="cursor:pointer; width:34px; height:34px; border:1px solid var(--blue);"></div>
            </div>
        </div>
    </header>

    <div id="homePage" class="page">
        <div id="searchChannels" style="display:none; gap:20px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px; border-bottom:1px solid var(--border);"></div>
        <div class="grid" id="mainFeed"></div>
        <center><button id="loadMoreBtn" onclick="renderMore()" class="sub-btn" style="margin-top:30px; display:none; background:var(--surf); color:var(--text); border:1px solid var(--border);">Еще видео</button></center>
    </div>

    <div id="videoPage" class="page">
        <div class="player-side">
            <div class="player-wrap">
                <video id="vPl" controls autoplay preload="auto"></video>
                
                <div class="endscreen" id="endScreenUI">
                    <div class="endscreen-content">
                        <div class="endscreen-author" id="endAuthorBtn">
                            <div class="avatar" id="endAv" style="width:75px; height:75px; font-size:26px; box-shadow: 0 0 15px rgba(62,166,255,0.4);"></div>
                            <b id="endAuthorName" style="font-size:16px;"></b>
                            <span style="font-size:12px; background:var(--red); padding:4px 12px; border-radius:20px; font-weight:bold; box-shadow: 0 4px 10px rgba(255,0,0,0.3);">Канал</span>
                        </div>
                        <div class="endscreen-recs" id="endRecsContainer"></div>
                    </div>
                    <div class="endscreen-controls">
                        <button class="ctrl-btn" onclick="replayVideo()">🔄 Пересмотреть</button>
                        <button class="ctrl-btn" onclick="rewindVideo(10)">⏪ Назад на 10 сек</button>
                    </div>
                </div>
            </div>
            <h2 id="vT" style="margin:15px 0 5px 0;"></h2>
            <div id="vViewsText" style="color:#888; font-size:13px; margin-bottom:15px;"></div>
            <div class="v-desc" id="vDescText"></div>
            <div class="actions">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="avatar" id="authorAv" style="cursor:pointer;"></div>
                    <div>
                        <b id="vA" style="cursor:pointer;"></b>
                        <div id="vSubCount" style="font-size:12px; color:#888;"></div>
                    </div>
                    <button id="subBtn" class="sub-btn">Подписаться</button>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="sub-btn active" id="likeBtn" onclick="toggleLike()" style="display:flex; align-items:center; gap:8px;">
                        <span id="likeIcon">🤍</span> <span id="likeCount">0</span>
                    </div>
                    <div id="vDelPlace"></div>
                </div>
            </div>
            <div class="comm-box">
                <h4 id="cCount">0 Комментариев</h4>
                <div class="comm-add">
                    <input type="text" id="cInp" placeholder="Оставьте комментарий...">
                    <button onclick="addComm()" class="sub-btn" style="background:var(--blue); color:#fff;">ОК</button>
                </div>
                <div id="cList"></div>
            </div>
        </div>
        <div id="recList" class="rec-side"></div>
    </div>

    <div id="channelPage" class="page">
        <div style="display:flex; align-items:center; gap:20px; padding:30px; background:var(--surf); border-radius:15px; margin-bottom:20px; border:1px solid var(--border);">
            <div class="avatar" id="chAv" style="width:80px; height:80px; font-size:30px;"></div>
            <div>
                <h2 id="chName" style="margin:0;"></h2>
                <p id="chDescContainer" style="font-size:14px; color:#ccc; margin:5px 0; max-width:500px; white-space:pre-wrap;"></p>
                <p id="chSubs" style="color:#888; margin:5px 0 10px 0;"></p>
                <button id="chSubBtn" class="sub-btn">Подписаться</button>
            </div>
        </div>
        <div class="grid" id="chFeed"></div>
    </div>

    <div class="overlay" id="ovl" onclick="closeM()"></div>
    
    <div id="settingsM" class="modal">
        <h3>Настройки</h3>
        <label style="font-size:12px; color:#aaa;">Описание канала (макс 150):</label>
        <textarea id="chDescInp" placeholder="Пару слов о себе..." maxlength="150" rows="3" style="width:93%; margin-top:5px;"></textarea>
        <button class="btn-main" onclick="updateChannelData()" style="margin-bottom:15px; background:var(--blue);">Сохранить описание</button>
        
        <label style="font-size:12px; color:#aaa;">Фото профиля:</label>
        <input type="file" id="avF" accept="image/*" style="font-size:10px; margin-top:5px;">
        <button class="btn-main" onclick="updateAvatar()" style="margin-bottom:10px;">Сменить фото</button>
        
        <button class="btn-main" onclick="openChannel(user)" style="background:var(--surf); color:var(--text); border:1px solid var(--border); margin-bottom:10px;">Мой канал</button>
        <div class="theme-toggle">
            <span>Светлая тема</span>
            <input type="checkbox" id="themeCheck" onchange="toggleTheme()">
        </div>
        <button class="btn-main" onclick="logout()" style="background:#311; color:#f66; margin-top:20px;">Выйти</button>
    </div>

    <div id="upM" class="modal">
        <h3>Загрузка видео</h3>
        <input type="text" id="upT" placeholder="Название (макс 50)" maxlength="50">
        <textarea id="upD" placeholder="Описание видео (макс 150)" maxlength="150" rows="3"></textarea>
        <label style="font-size:11px; color:#aaa;">Файл видео:</label>
        <input type="file" id="upF" accept="video/*" style="font-size:11px; margin-bottom:10px;">
        <label style="font-size:11px; color:#aaa;">Заставка (Обложка фото) - НЕОБЯЗАТЕЛЬНО:</label>
        <input type="file" id="upThumbF" accept="image/*" style="font-size:11px;">
        <div id="upS" style="font-size:12px; color:var(--blue); margin-top:5px;"></div>
        <button class="btn-main" onclick="upload()" style="margin-top:10px;">Опубликовать</button>
    </div>

    <div id="loginM" class="modal">
        <h3>Вход</h3>
        <input type="text" id="liU" placeholder="Логин" maxlength="10">
        <input type="password" id="liP" placeholder="Пароль">
        <button class="btn-main" onclick="auth('login')">Войти</button>
        <p onclick="openM('regM')" style="cursor:pointer; color:var(--blue); font-size:12px; text-align:center; margin-top:10px;">Нет аккаунта? Регистрация</p>
    </div>

    <div id="regM" class="modal">
        <h3>Registration</h3>
        <input type="text" id="rgU" placeholder="Логин (Только латиница, макс 10)" maxlength="10">
        <input type="password" id="rgP" placeholder="Пароль">
        <button class="btn-main" onclick="auth('reg')">Создать</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, serverTimestamp, getDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBw5b72gU3RIBn3NUqwnJz4a7QAf-ox-hg", authDomain: "rusltube-ff487.firebaseapp.com", projectId: "rusltube-ff487", storageBucket: "rusltube-ff487.firebasestorage.app", messagingSenderId: "144869005114", appId: "1:144869005114:web:764ec36730b6c8c7012203" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const CLOUD = "dujfw1ch1"; const PRESET = "RuslTube";
        
        window.user = localStorage.getItem("rUser");
        let curVid = null; let curVidAuthor = null; let homeVids = []; let homeStart = 0; let avCache = {};

        if(localStorage.getItem('lightMode') === 'true') { document.body.classList.add('light'); document.getElementById('themeCheck').checked = true; }
        window.toggleTheme = () => { const isL = document.body.classList.toggle('light'); localStorage.setItem('lightMode', isL); };

        function esc(s) { return s ? s.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ""; }
        
        function optImg(url) {
            if(!url) return "";
            if(url.includes("cloudinary.com")) return url.replace("/upload/", "/upload/w_100,c_fill,q_auto,f_auto/");
            return url;
        }

        function getCardThumb(v) {
            if (v.thumb && v.thumb.trim() !== "") return v.thumb;
            if (v.url && v.url.includes("cloudinary.com")) {
                let baseUrl = v.url.substring(0, v.url.lastIndexOf('.'));
                return baseUrl.replace("/video/upload/", "/video/upload/w_400,c_limit,q_auto,f_auto/") + ".jpg";
            }
            return "";
        }

        async function getAv(n) {
            if(avCache[n]) return avCache[n];
            const q = query(collection(db, "users"), where("u", "==", n));
            const s = await getDocs(q); let url = ""; s.forEach(d => url = d.data().av || "");
            avCache[n] = optImg(url); return avCache[n];
        }
        function drawAv(u, n) { return u ? `<img src="${u}">` : (n ? n[0].toUpperCase() : "?"); }

        const player = document.getElementById('vPl');
        const endScreen = document.getElementById('endScreenUI');
        player.ontimeupdate = () => {
            if(player.duration && (player.duration - player.currentTime <= 1.0)) {
                if(endScreen.style.display !== 'flex') showEndScreen();
            } else {
                endScreen.style.display = 'none';
            }
        };

        window.replayVideo = () => {
            endScreen.style.display = 'none';
            player.currentTime = 0;
            player.play();
        };

        window.rewindVideo = (sec) => {
            endScreen.style.display = 'none';
            let targetTime = player.currentTime - sec;
            player.currentTime = targetTime < 0 ? 0 : targetTime;
            player.play();
        };

        window.switchPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = (id === 'videoPage') ? 'grid' : 'block';
            if(id !== 'videoPage') { player.pause(); player.src = ""; endScreen.style.display = 'none'; }
        };

        window.goHome = () => { 
            document.getElementById('sInp').value = "";
            document.getElementById('searchChannels').style.display = 'none';
            switchPage('homePage'); loadFeed(); 
        };
        window.openM = (id) => { 
            closeM(); document.getElementById(id).style.display='block'; document.getElementById('ovl').style.display='block'; 
            if(id === 'settingsM' && user) {
                const q = query(collection(db, "users"), where("u", "==", user));
                getDocs(q).then(s => s.forEach(d => document.getElementById('chDescInp').value = d.data().desc || ""));
            }
        };
        window.closeM = () => { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('ovl').style.display='none'; };

        window.search = async () => {
            const v = document.getElementById('sInp').value.trim().toLowerCase();
            if(!v) return goHome();
            switchPage('homePage');
            const feed = document.getElementById('mainFeed'); const chBox = document.getElementById('searchChannels');
            feed.innerHTML = "Поиск..."; chBox.innerHTML = ""; chBox.style.display = 'none';
            
            const uS = await getDocs(collection(db, "users"));
            let cf = false;
            uS.forEach(d => {
                const u = d.data().u;
                if(u && u.toLowerCase().includes(v)) {
                    cf = true;
                    chBox.innerHTML += `<div class="ch-card" onclick="openChannel('${u}')"><div class="avatar">${drawAv(optImg(d.data().av), u)}</div><b style="font-size:12px; margin-top:5px;">@${esc(u)}</b></div>`;
                }
            });
            if(cf) chBox.style.display = 'flex';

            const vS = await getDocs(collection(db, "videos"));
            feed.innerHTML = ""; let found = false;
            for(const d of vS.docs) {
                const vi = d.data();
                if(vi.title.toLowerCase().includes(v) || vi.author.toLowerCase().includes(v)) {
                    found = true; const av = await getAv(vi.author);
                    feed.innerHTML += `<div class="card" onclick="openV('${d.id}')"><div class="thumb-wrap"><img src="${getCardThumb(vi)}" loading="lazy"></div><div class="card-info"><div class="avatar" onclick="event.stopPropagation(); openChannel('${vi.author}')">${drawAv(av, vi.author)}</div><div><h4>${esc(vi.title)}</h4><p onclick="event.stopPropagation(); openChannel('${vi.author}')">@${esc(vi.author)} • ${vi.views||0} просмотров</p></div></div></div>`;
                }
            }
            if(!found && !cf) feed.innerHTML = "Ничего не найдено";
        };

        window.openV = async (id) => {
            curVid = id; endScreen.style.display = 'none'; window.scrollTo(0,0);
            const d = (await getDoc(doc(db, "videos", id))).data();
            curVidAuthor = d.author;
            switchPage('videoPage');
            player.src = d.url;
            document.getElementById('vT').innerText = d.title;
            document.getElementById('vDescText').innerText = d.desc || "Нет описания";
            document.getElementById('vViewsText').innerText = `${(d.views || 0) + 1} просмотров`;
            document.getElementById('vA').innerText = "@" + d.author;
            document.getElementById('vA').onclick = () => openChannel(d.author);
            const av = await getAv(d.author);
            document.getElementById('authorAv').innerHTML = drawAv(av, d.author);
            document.getElementById('authorAv').onclick = () => openChannel(d.author);
            document.getElementById('vDelPlace').innerHTML = (d.author === user) ? `<button onclick="deleteVid('${id}')" style="background:none; border:none; color:red; cursor:pointer; font-size:12px;">Удалить</button>` : "";
            updateSubUI(d.author, 'subBtn', 'vSubCount'); updateLikeUI(); loadComms(id); loadRecs(id);
            updateDoc(doc(db, "videos", id), { views: increment(1) }).catch(()=>{});
        };

        async function showEndScreen() {
            const av = await getAv(curVidAuthor);
            document.getElementById('endAv').innerHTML = drawAv(av, curVidAuthor);
            document.getElementById('endAuthorName').innerText = "@" + curVidAuthor;
            document.getElementById('endAuthorBtn').onclick = () => openChannel(curVidAuthor);
            
            const s = await getDocs(collection(db, "videos"));
            let r = s.docs.filter(d => d.id !== curVid).map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5).slice(0, 2);
            const box = document.getElementById('endRecsContainer'); box.innerHTML = "";
            r.forEach(v => {
                box.innerHTML += `<div class="endscreen-rec-card" onclick="event.stopPropagation(); openV('${v.id}')"><img src="${getCardThumb(v)}"><h5>${esc(v.title)}</h5></div>`;
            });
            endScreen.style.display = 'flex';
        }

        window.openChannel = async (n) => {
            closeM(); switchPage('channelPage');
            document.getElementById('chName').innerText = "@" + n;
            
            const uS = await getDocs(query(collection(db, "users"), where("u", "==", n)));
            let desc = "Описание канала отсутствует.";
            uS.forEach(d => { if(d.data().desc) desc = d.data().desc; });
            document.getElementById('chDescContainer').innerText = desc;

            const av = await getAv(n); document.getElementById('chAv').innerHTML = drawAv(av, n);
            updateSubUI(n, 'chSubBtn', 'chSubs');
            const s = await getDocs(query(collection(db, "videos"), where("author", "==", n)));
            const f = document.getElementById('chFeed'); f.innerHTML = "";
            s.forEach(d => {
                const v = d.data();
                f.innerHTML += `<div class="card" onclick="openV('${d.id}')"><div class="thumb-wrap"><img src="${getCardThumb(v)}" loading="lazy"></div><div class="card-info"><div><h4>${esc(v.title)}</h4><p>${v.views||0} просмотров</p></div></div></div>`;
            });
        };

        window.loadFeed = async () => {
            const s = await getDocs(collection(db, "videos"));
            homeVids = s.docs.map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5);
            document.getElementById('mainFeed').innerHTML = ""; homeStart = 0; renderMore();
        };

        // Подгрузка строго по 16 видео за раз
        window.renderMore = async () => {
            const end = Math.min(homeStart + 16, homeVids.length);
            const f = document.getElementById('mainFeed');
            for (let i = homeStart; i < end; i++) {
                const v = homeVids[i]; const av = await getAv(v.author);
                f.innerHTML += `<div class="card" onclick="openV('${v.id}')"><div class="thumb-wrap"><img src="${getCardThumb(v)}" loading="lazy"></div><div class="card-info"><div class="avatar" onclick="event.stopPropagation(); openChannel('${v.author}')">${drawAv(av, v.author)}</div><div><h4>${esc(v.title)}</h4><p onclick="event.stopPropagation(); openChannel('${v.author}')">@${esc(v.author)} • ${v.views || 0} просмотров</p></div></div></div>`;
            }
            homeStart = end; document.getElementById('loadMoreBtn').style.display = (homeStart < homeVids.length) ? 'block' : 'none';
        };

        window.loadRecs = async (id) => {
            const s = await getDocs(collection(db, "videos"));
            let r = s.docs.filter(d => d.id !== id).map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5).slice(0, 7);
            const l = document.getElementById('recList'); l.innerHTML = "";
            r.forEach(v => {
                l.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:12px; cursor:pointer;" onclick="openV('${v.id}')"><img src="${getCardThumb(v)}" style="width:140px; aspect-ratio:16/9; border-radius:8px; object-fit:cover;" loading="lazy"><div><h5 style="margin:0; font-size:13px; line-height:1.2;">${esc(v.title)}</h5><p style="font-size:11px; color:#888; margin-top:4px;">@${esc(v.author)}</p></div></div>`;
            });
        };

        window.upload = async () => {
            const f = document.getElementById('upF').files[0]; 
            const thumbF = document.getElementById('upThumbF').files[0];
            const t = document.getElementById('upT').value.trim(); 
            const d = document.getElementById('upD').value.trim();
            
            if(!f || !t) return alert("Выберите видео и введите название!");
            document.getElementById('upS').innerText = "Загрузка видеофайла...";
            
            const fdV = new FormData(); fdV.append('file', f); fdV.append('upload_preset', PRESET);
            const resV = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/video/upload`, {method:'POST', body:fdV});
            const dataV = await resV.json();
            
            let finalThumbUrl = "";
            if (thumbF) {
                document.getElementById('upS').innerText = "Загрузка обложки...";
                const fdT = new FormData(); fdT.append('file', thumbF); fdT.append('upload_preset', PRESET);
                const resT = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, {method:'POST', body:fdT});
                const dataT = await resT.json();
                finalThumbUrl = dataT.secure_url;
            }
            
            await addDoc(collection(db, "videos"), { title: t, desc: d, url: dataV.secure_url, thumb: finalThumbUrl, author: user, views: 0, createdAt: serverTimestamp() }); 
            location.reload();
        };

        window.auth = async (m) => {
            const u = document.getElementById(m=='reg'?'rgU':'liU').value.trim();
            const p = document.getElementById(m=='reg'?'rgP':'liP').value.trim();
            if(!u || !p) return;
            
            if(m=='reg') {
                const latReg = /^[A-Za-z0-9]+$/;
                if(!latReg.test(u)) return alert("Ошибка! Логин должен состоять ТОЛЬКО из латинских букв и цифр!");
                const q = query(collection(db, "users"), where("u","==",u));
                if(!(await getDocs(q)).empty) return alert("Логин занят!");
                await addDoc(collection(db, "users"), {u, p, av: "", desc: ""});
            } else {
                const q = query(collection(db, "users"), where("u","==",u), where("p","==",p));
                const s = await getDocs(q); if(s.empty) return alert("Неверный логин или пароль!");
            }
            localStorage.setItem("rUser", u); location.reload();
        };

        window.updateChannelData = async () => {
            const text = document.getElementById('chDescInp').value.trim();
            const q = query(collection(db, "users"), where("u", "==", user));
            const s = await getDocs(q);
            await updateDoc(doc(db, "users", s.docs[0].id), { desc: text });
            alert("Описание успешно сохранено!");
        };

        window.updateAvatar = async () => {
            const f = document.getElementById('avF').files[0]; if(!f) return;
            const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, {method:'POST', body:fd});
            const data = await res.json();
            const q = query(collection(db, "users"), where("u", "==", user));
            const s = await getDocs(q); await updateDoc(doc(db, "users", s.docs[0].id), { av: data.secure_url }); location.reload();
        };

        window.logout = () => { localStorage.removeItem("rUser"); location.reload(); };

        window.toggleLike = async () => {
            if(!user) return openM('loginM');
            const q = query(collection(db, "likes"), where("vId", "==", curVid), where("u", "==", user));
            const s = await getDocs(q);
            if(s.empty) await addDoc(collection(db, "likes"), {vId: curVid, u: user});
            else await deleteDoc(doc(db, "likes", s.docs[0].id));
            updateLikeUI();
        };

        async function updateLikeUI() {
            const q = query(collection(db, "likes"), where("vId", "==", curVid));
            const s = await getDocs(q); document.getElementById('likeCount').innerText = s.size;
            let m = false; s.forEach(d => { if(d.data().u === user) m = true; });
            document.getElementById('likeIcon').innerText = m ? "❤️" : "🤍";
        }

        window.addComm = async () => {
            const t = document.getElementById('cInp').value.trim(); if(!user || !t) return !user ? openM('loginM') : null;
            await addDoc(collection(db, "comments"), { vId: curVid, u: user, t, createdAt: serverTimestamp() });
            document.getElementById('cInp').value = ""; loadComms(curVid);
        };

        window.deleteComment = async (cId) => {
            if(confirm("Удалить этот комментарий?")) {
                await deleteDoc(doc(db, "comments", cId));
                loadComms(curVid);
            }
        };

        async function loadComms(vId) {
            const q = query(collection(db, "comments"), where("vId", "==", vId));
            const s = await getDocs(q); const l = document.getElementById('cList'); l.innerHTML = "";
            document.getElementById('cCount').innerText = `${s.size} Комментариев`;
            const ds = s.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));
            
            for (const d of ds) {
                const c = d.data(); const av = await getAv(c.u);
                let delBtnHtml = "";
                if(user && (c.u === user || curVidAuthor === user)) {
                    delBtnHtml = `<button class="del-comment-btn" onclick="deleteComment('${d.id}')">[Удалить]</button>`;
                }
                l.innerHTML += `<div style="display:flex; gap:12px; margin-bottom:12px;"><div class="avatar" style="width:32px; height:32px; cursor:pointer;" onclick="openChannel('${c.u}')">${drawAv(av, c.u)}</div><div style="flex:1;"><b style="font-size:13px; cursor:pointer;" onclick="openChannel('${c.u}')">@${esc(c.u)}</b>${delBtnHtml}<p style="margin:2px 0 0; font-size:14px;">${esc(c.t)}</p></div></div>`;
            }
        }

        window.updateSubUI = async (a, bId, cId) => {
            const qS = query(collection(db, "subs"), where("to", "==", a));
            const count = (await getDocs(qS)).size;
            document.getElementById(cId).innerText = `${count} Подписчиков`;
            const btn = document.getElementById(bId); if(!user || !btn) return;
            const snap = await getDocs(query(collection(db, "subs"), where("from","==",user), where("to","==",a)));
            btn.innerText = snap.empty ? "Подписаться" : "Вы подписаны";
            btn.className = snap.empty ? "sub-btn" : "sub-btn active";
            btn.onclick = () => toggleSub(a, bId, cId);
        };

        window.toggleSub = async (a, bId, cId) => {
            if(!user) return openM('loginM'); if(a === user) return;
            const q = query(collection(db, "subs"), where("from","==",user), where("to","==",a));
            const snap = await getDocs(q);
            if(snap.empty) await addDoc(collection(db, "subs"), {from:user, to:a});
            else await deleteDoc(doc(db, "subs", snap.docs[0].id));
            updateSubUI(a, bId, cId);
        };

        window.deleteVid = async (id) => { if(confirm("Удалить видео?")) { await deleteDoc(doc(db, "videos", id)); goHome(); } };

        if(user) { 
            document.getElementById('loginBtnUI').style.display='none'; document.getElementById('userUI').style.display='flex';
            getAv(user).then(url => document.getElementById('myHeadAv').innerHTML = drawAv(url, user));
        }
        loadFeed();
    </script>
</body>
</html>
